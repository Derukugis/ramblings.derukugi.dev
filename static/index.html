<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>derukugi.dev</title>

<style>


  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    display: flex;
    justify-content: center;
    font-family: monospace;
    background-color: white;
    position: relative;
    overflow: hidden;
  }

  #grid-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
  }

  .title {
    font-size: 3em;
    margin: 12px;
    margin-bottom: 0px;
  }

  .container {
    display: block;
    text-align: center;
  }

  .subtitle {
    font-size: 1.25em;
    margin: 7px;
  }

  .service {
    margin: 7px;
  }

</style>
</head>
<body>
  <canvas id="grid-canvas"></canvas>
  <div class="container">
    <p class="title"><b>DERUKUGI</b></p>

    <p class="subtitle">I like cybersec & homelabbing</p>
    <div class="socials">
      <a href="https://github.com/Derukugis">Github</a> |
      <a href="https://x.com/derukugi">Twitter</a> |
      <a href="mailto:derukugi@tuta.io">E-Mail</a>
    </div>
    <div class="services">
      <p class="service">Services:</p>
      <a href="https://search.derukugi.dev">4get</a> |
      <a href="https://wiki.derukugi.dev">Wiki Mirrors</a>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('grid-canvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const gridSize = 20;
    const revealedGrid = [];

    // Initialize revealed grid (all invisible)
    for (let i = 0; i < Math.ceil(canvas.height / gridSize) + 50; i++) {
      revealedGrid[i] = [];
      for (let j = 0; j < Math.ceil(canvas.width / gridSize) + 50; j++) {
        revealedGrid[i][j] = false;
      }
    }

    class Line {
      constructor() {
        const edge = Math.floor(Math.random() * 4);
        if (edge === 0) { // top
          this.x = Math.random() * canvas.width;
          this.y = 0;
        } else if (edge === 1) { // right
          this.x = canvas.width;
          this.y = Math.random() * canvas.height;
        } else if (edge === 2) { // bottom
          this.x = Math.random() * canvas.width;
          this.y = canvas.height;
        } else { // left
          this.x = 0;
          this.y = Math.random() * canvas.height;
        }
        
        this.angle = Math.random() * Math.PI * 2;
        this.speed = 2 + Math.random() * 3;
        this.alive = true;
      }

      update() {
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;

        // Change direction randomly
        if (Math.random() < 0.02) {
          this.angle += (Math.random() - 0.5) * 0.5;
        }

        // Mark grid cells as revealed
        const gridX = Math.floor(this.x / gridSize);
        const gridY = Math.floor(this.y / gridSize);
        
        if (gridY >= 0 && gridY < revealedGrid.length && gridX >= 0 && gridX < revealedGrid[0].length) {
          revealedGrid[gridY][gridX] = true;
        }

        // Kill line if out of bounds
        if (this.x < -100 || this.x > canvas.width + 100 || this.y < -100 || this.y > canvas.height + 100) {
          this.alive = false;
        }
      }
    }

    const lines = [];
    
    // Spawn initial lines
    for (let i = 0; i < 30; i++) {
      lines.push(new Line());
    }

    function drawGrid() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw only revealed grid lines
      ctx.strokeStyle = '#E5E4E2';
      ctx.lineWidth = 1;

      for (let i = 0; i < revealedGrid.length; i++) {
        for (let j = 0; j < revealedGrid[i].length; j++) {
          if (revealedGrid[i][j]) {
            const x = j * gridSize;
            const y = i * gridSize;
            
            // Draw diagonal lines forming diamond pattern
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + gridSize, y + gridSize);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(x + gridSize, y);
            ctx.lineTo(x, y + gridSize);
            ctx.stroke();
          }
        }
      }
    }

    function animate() {
      // Update lines
      for (let i = lines.length - 1; i >= 0; i--) {
        lines[i].update();
        if (!lines[i].alive) {
          lines.splice(i, 1);
        }
      }

      // Spawn new lines periodically
      if (Math.random() < 0.1 && lines.length < 50) {
        lines.push(new Line());
      }

      drawGrid();
      requestAnimationFrame(animate);
    }

    animate();

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
